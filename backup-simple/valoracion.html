<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A90E2">
  <title>Nueva Valoración - HSV Móvil</title>
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <button class="back-btn" onclick="location.href='index.html'">←</button>

  <div class="form-container">
    <div class="form-header">
      <h2>📋 Nueva Valoración</h2>
      <p class="text-muted">Completa los campos para crear una valoración</p>
    </div>

    <!-- Información básica -->
    <div class="form-section">
      <h3>Información General</h3>
      
      <div class="form-group">
        <label for="paciente">Nombre del Paciente *</label>
        <input type="text" id="paciente" required placeholder="Nombre completo">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fecha">Fecha *</label>
          <input type="date" id="fecha" required>
        </div>
        <div class="form-group">
          <label for="tipo">Tipo de Valoración *</label>
          <select id="tipo" required>
            <option value="">Seleccionar...</option>
            <option value="Inicial">Inicial</option>
            <option value="Trimestral">Trimestral</option>
            <option value="Egreso">Egreso</option>
            <option value="Reingreso">Reingreso</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="hora_start">Hora Inicio</label>
          <input type="time" id="hora_start">
        </div>
        <div class="form-group">
          <label for="hora_end">Hora Fin</label>
          <input type="time" id="hora_end">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="responsable">Responsable *</label>
          <select id="responsable" required>
            <option value="">Seleccionar...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="apoyo">Apoyo (Opcional)</label>
          <select id="apoyo">
            <option value="">Sin apoyo</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Antecedentes -->
    <div class="form-section">
      <h3>Antecedentes</h3>
      <div id="antecedentes_container" class="mb-2"></div>
      <div style="display:flex;gap:0.5rem;">
        <input type="text" id="new_antecedente" placeholder="Agregar antecedente..." style="flex:1;padding:0.75rem;border:2px solid var(--border);border-radius:8px;">
        <button class="btn btn-secondary" onclick="addAntecedente()">+</button>
      </div>
    </div>

    <!-- Formato ALICIA -->
    <div class="form-section">
      <h3>Formato ALICIA</h3>
      
      <div class="form-group">
        <label for="alic_a">Aparición / Inicio</label>
        <input type="text" id="alic_a" placeholder="¿Cuándo inició?">
      </div>

      <div class="form-group">
        <label for="alic_l">Localización</label>
        <input type="text" id="alic_l" placeholder="¿Dónde se localiza?">
      </div>

      <div class="form-group">
        <label for="alic_i">Irradiación</label>
        <input type="text" id="alic_i" placeholder="¿Hacia dónde se irradia?">
      </div>

      <div class="form-group">
        <label for="alic_c">Características</label>
        <input type="text" id="alic_c" placeholder="Tipo de dolor/síntoma">
      </div>

      <div class="form-group">
        <label for="alic_i2">Intensidad (EVA 0-10)</label>
        <input type="number" id="alic_i2" min="0" max="10" placeholder="Escala 0-10">
      </div>

      <div class="form-group">
        <label for="alic_a2">Atenuantes / Agravantes</label>
        <input type="text" id="alic_a2" placeholder="Qué lo mejora o empeora">
      </div>
    </div>

    <!-- Postura -->
    <div class="form-section">
      <h3>Evaluación Postural</h3>
      
      <div class="form-group">
        <label for="post_anterior">Vista Anterior</label>
        <textarea id="post_anterior" placeholder="Observaciones vista anterior..."></textarea>
      </div>

      <div class="form-group">
        <label for="post_lateral">Vista Lateral</label>
        <textarea id="post_lateral" placeholder="Observaciones vista lateral..."></textarea>
      </div>

      <div class="form-group">
        <label for="post_posterior">Vista Posterior</label>
        <textarea id="post_posterior" placeholder="Observaciones vista posterior..."></textarea>
      </div>

      <div class="form-group">
        <label for="post_cefalo">Céfalo-caudal (Opcional)</label>
        <textarea id="post_cefalo" placeholder="Observaciones céfalo-caudal..."></textarea>
      </div>
    </div>

    <!-- Diagnóstico -->
    <div class="form-section">
      <h3>Diagnóstico Fisioterapéutico</h3>
      <div class="form-group">
        <label for="diagnostico">Diagnóstico *</label>
        <textarea id="diagnostico" required placeholder="Escribe el diagnóstico fisioterapéutico..." style="min-height:120px;"></textarea>
      </div>
    </div>

    <!-- Acciones -->
    <div class="btn-actions">
      <button class="btn btn-secondary" onclick="clearForm()">🗑️ Limpiar</button>
      <button class="btn btn-primary" onclick="guardarBorrador()">💾 Guardar Borrador</button>
    </div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/export.js"></script>
  <script src="js/mobile-valoracion.js"></script>
</body>
</html>
